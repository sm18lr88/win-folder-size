name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up vcpkg
        run: |
          vcpkg integrate install
        shell: cmd

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\packages
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-x64-windows-

      - name: Configure CMake
        run: |
          cmake -B build ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: cmd

      - name: Build Release
        run: cmake --build build --config Release
        shell: cmd

      - name: Build Tests
        run: cmake --build build --config Release --target foldersize_tests
        shell: cmd

      - name: Run Tests
        run: ctest --test-dir build --build-config Release --output-on-failure
        shell: cmd

      - name: Package release artifact
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "manual-${{ github.run_number }}"
          }
          $zipName = "foldersize-$tag-win64.zip"
          $staging = "staging"
          Remove-Item -Recurse -Force $staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "build\Release\foldersize.dll" $staging
          Copy-Item "build\Release\foldersize.pdb" $staging
          Copy-Item "scripts\install.bat" $staging
          Copy-Item "scripts\uninstall.bat" $staging
          Copy-Item "scripts\status.bat" $staging
          Copy-Item "docs" $staging -Recurse
          Copy-Item "README.md" $staging
          Copy-Item "LICENSE" $staging
          @"
          FolderSize $tag
          Commit: ${{ github.sha }}
          Build run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Built by GitHub Actions on windows-latest.
          "@ | Set-Content -Path "$staging\BUILD-INFO.txt" -Encoding UTF8
          Compress-Archive -Path "$staging\*" -DestinationPath $zipName -Force
          $hash = Get-FileHash -Algorithm SHA256 $zipName
          "$($hash.Hash)  $zipName" | Set-Content -Path "$zipName.sha256" -Encoding ASCII
          Write-Output "RELEASE_ZIP=$zipName" >> $env:GITHUB_ENV
          Write-Output "RELEASE_SHA256=$zipName.sha256" >> $env:GITHUB_ENV
          Write-Output "Packaged: $zipName"
          Get-Content "$zipName.sha256"
          Get-ChildItem $staging
        shell: pwsh

      - name: Prepare release notes
        run: |
          $tag = "${{ github.ref_name }}"
          $notesPath = "docs\release-notes\$tag.md"
          if (Test-Path $notesPath) {
            Copy-Item $notesPath "RELEASE_NOTES.md"
          } else {
            @(
              "## Summary"
              ""
              "FolderSize $tag was built and tested by GitHub Actions."
              ""
              "## Artifact"
              ""
              "- ``foldersize-$tag-win64.zip``"
              "- ``foldersize-$tag-win64.zip.sha256``"
              ""
              "## Provenance"
              ""
              "- Commit: ${{ github.sha }}"
              "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            ) | Set-Content -Path "RELEASE_NOTES.md" -Encoding UTF8
          }
          Get-Content "RELEASE_NOTES.md"
        shell: pwsh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ZIP }}
          path: |
            ${{ env.RELEASE_ZIP }}
            ${{ env.RELEASE_SHA256 }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_ZIP }}
            ${{ env.RELEASE_SHA256 }}
          body_path: RELEASE_NOTES.md
